_schema-version: "3.1"
ID: technova-o2c
version: 1.0.0
description: TechNova Solutions Order-to-Cash Process on SAP BTP

modules:

  # ─── CAP Backend ────────────────────────────────────────────────────────────
  - name: technova-o2c-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: technova-o2c-db
      - name: technova-o2c-auth

  # ─── DB Deployer ─────────────────────────────────────────────────────────────
  - name: technova-o2c-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
    requires:
      - name: technova-o2c-db

resources:

  # ─── SAP HANA Cloud ──────────────────────────────────────────────────────────
  - name: technova-o2c-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: ${service-name}

  # ─── XSUAA (Authentication) ──────────────────────────────────────────────────
  - name: technova-o2c-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: technova-o2c-${org}-${space}
        tenant-mode: dedicated
