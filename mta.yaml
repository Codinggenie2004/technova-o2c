_schema-version: "3.1"
ID: technova-o2c
version: 1.0.0
description: TechNova Solutions Order-to-Cash Process on SAP BTP

modules:

  # ─── CAP Backend ────────────────────────────────────────────────────────────
  - name: technova-o2c-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}


