name: Deploy to SAP BTP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CDS toolkit
        run: npm install -g @sap/cds-dk

      - name: Validate CDS model
        run: cds compile db/ srv/ --to json > /dev/null && echo "✅ CDS model is valid"

      - name: Deploy to SQLite (test)
        run: cds deploy --to sqlite:test.sqlite

      - name: Run tests
        run: npm test

