name: TechNova O2C — Build & Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate CDS Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SAP CDS toolkit
        run: npm install -g @sap/cds-dk

      - name: Validate CDS data model
        run: cds compile db/schema.cds --to json > /dev/null && echo "✅ Schema is valid"

      - name: Validate CDS service
        run: cds compile srv/o2c-service.cds db/schema.cds --to json > /dev/null && echo "✅ Service is valid"

      - name: List all entities and services
        run: cds compile db/ srv/ --to json | node -e "const m=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); const keys=Object.keys(m.definitions||{}); console.log('📦 Entities/Services found:',keys.length); keys.forEach(k=>console.log(' -',k))"

      - name: Check project structure
        run: |
          echo "📁 Project structure:"
          find . -not -path './node_modules/*' -not -path './.git/*' -type f | sort
